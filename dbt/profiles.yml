# dbt/profiles.yml

cinema: # Este nome deve ser igual ao 'profile:' dentro do dbt_project.yml do cinema
  target: dev
  outputs:
    dev:
      type: postgres
      host: db
      user: postgres
      pass: postgres  # sua senha do banco
      port: 5432
      dbname: cinema_brasil
      schema: public
      threads: 3


apiVersion: sparkoperator.k8s.io/v1beta2
kind: SparkApplication
metadata:
  name: pyspark-pgdas-exec-find-fisc
  namespace: spark-jobs
spec:
  type: Python
  pythonVersion: "3"
  mode: cluster
  image: us-central1-docker.pkg.dev/infra-itaborai/registry-ita/spark-py-prod:latest
  imagePullPolicy: IfNotPresent
  mainApplicationFile: gs://spark-ita/jobs/job_pgdas_apuracao_vltotal.py
  sparkVersion: "3.4.1"
  restartPolicy:
    type: Never
  driver:
    tolerations:
      - key: "critical"
        operator: "Equal"
        value: "true"
        effect: "NoSchedule"
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            - key: node-type
              operator: In
              values:
              - critical
    cores: 2
    instances: 2
    memory: "6g"
    serviceAccount: spark-sa  # substitua se necessário
    labels:
      version: 3.4.1
    env:
      - name: MUNICIPIO
        value: "{{ dag_run.conf['MUNICIPIO'] }}"  # 
      - name: DEST_URL
        value: "{{ dag_run.conf['DEST_URL'] }}"  # 
      
  executor:
    serviceAccount: spark-sa
    cores: 2
    instances: 4
    memory: "16g"
    # --- INÍCIO DAS CORREÇÕES PARA AGENDAMENTO DOS EXECUTORES EM NÓS SPOT ---
    # Removendo tolerations, pois o nó spot fornecido não tem taints.
    # Se você tiver outros pools de nós spot com taints, você os adicionaria aqui.
    tolerations: [] # Vazio, pois o nó spot fornecido não tem taints.

    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
          - matchExpressions:
            # Opção 1 (Recomendada - mais genérica para qualquer nó preemptivo/spot do GKE):
            - key: "cloud.google.com/gke-preemptible"
              operator: "In"
              values:
              - "true"
            # Opção 2 (Mais específica para seu pool highmem spot):
            # Você pode usar esta OU a de cima, ou AMBAS se quiser uma AND condition.
            # Se usar ambas, o nó precisa ter AMBOS os rótulos.
            - key: "purpose" # Ou cloud.google.com/gke-nodepool
              operator: "In"
              values:
              - "highmem" # Ou "pool-spot-highmem" para o nodepool
    # --- FIM DAS CORREÇÕES PARA AGENDAMENTO DOS EXECUTORES EM NÓS SPOT ---
  sparkConf:
    # Google Cloud Storage
    "spark.hadoop.fs.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem"
    "spark.hadoop.fs.AbstractFileSystem.gs.impl": "com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS"
    "spark.hadoop.google.cloud.auth.service.account.enable": "true"
    
    # BigQuery - usando credentials.json (ou Workload Identity)
    "parentProject": "infra-itaborai"

    # Delta Lake
    "spark.sql.extensions": "io.delta.sql.DeltaSparkSessionExtension"
    "spark.sql.catalog.spark_catalog": "org.apache.spark.sql.delta.catalog.DeltaCatalog"
    "spark.databricks.delta.retentionDurationCheck.enabled": "true"
    "spark.databricks.delta.checkpointInterval": "10"
    "spark.delta.logLevel": "DEBUG"

  deps:
    jars:
      - local:///opt/spark/jars/spark-bigquery-with-dependencies_2.12-0.30.0.jar
      - local:///opt/spark/jars/delta-core_2.12-2.4.0.jar